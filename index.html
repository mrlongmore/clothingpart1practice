<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Clothing Identification Practice</h1>
        <button id="startQuiz">Start Practice</button>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="nameInput">
                <h2>Enter Your Name</h2>
                <input type="text" id="userName" placeholder="Your Name">
                <button id="submitName">Start</button>
            </div>
            <div id="quizContent" style="display: none;">
                <div id="videoContainer">
                    <video id="quizVideo" controls>
                        <source id="videoSource" src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </source>
                    </video>
                </div>
                <div id="questionArea">
                    <h3 id="questionText"></h3>
                    <div id="options">
                        <button class="option" data-index="0"></button>
                        <button class="option" data-index="1"></button>
                        <button class="option" data-index="2"></button>
                        <button class="option" data-index="3"></button>
                    </div>
                </div>
                <div id="certificate" style="display: none;">
                    <h2>Congratulations, <span id="certName"></span>!</h2>
                    <p>You answered <span id="correctCount"></span> questions correctly.</p>
                    <p>You got <span id="incorrectCount"></span> questions incorrect.</p>
                    <p>Please upload this certificate to Google Classroom.</p>
                    <button id="restartQuiz">Restart Quiz</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
